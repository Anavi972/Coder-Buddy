<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorful Todo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>Colorful Todo</h1>
    </header>

    <section class="input-section">
      <input
        id="new-todo"
        type="text"
        placeholder="What needs to be done?"
        autocomplete="off"
        aria-label="New todo"
      />
    </section>

    <ul id="todo-list" class="todo-list" role="list" aria-label="Todo list"></ul>

    <footer class="footer">
      <div class="filters" role="group" aria-label="Todo filters">
        <button data-filter="all" aria-pressed="true">All</button>
        <button data-filter="active" aria-pressed="false">Active</button>
        <button data-filter="completed" aria-pressed="false">Completed</button>
      </div>
      <div class="items-left" aria-live="polite" id="items-left">0 items left</div>
    </footer>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
